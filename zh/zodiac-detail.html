<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuckyXiao · 生肖详情</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #1f2937; background-color: #ffffff; }
    a { text-decoration: none; color: inherit; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .navbar { background: #ffffff; box-shadow: 0 2px 15px rgba(229, 62, 62, 0.1); padding: 16px 0; position: sticky; top: 0; z-index: 100; }
    .navbar .container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .logo { display: flex; align-items: center; gap: 10px; font-size: 1.5rem; font-weight: 700; }
    .logo-img { height: 40px; width: auto; }
    .logo-highlight { color: #e53e3e; }
    .nav-right { display: flex; align-items: center; gap: 2rem; }
    .nav-links { display: flex; gap: 2.5rem; font-weight: 500; }
    .nav-links a:hover { color: #e53e3e; }
    .lang-switcher { display: flex; align-items: center; gap: 6px; background: #fef2f2; padding: 5px 12px; border-radius: 30px; }
    .lang-btn { background: none; border: none; font-size: 1rem; font-weight: 600; color: #9ca3af; cursor: pointer; padding: 4px 8px; border-radius: 20px; text-decoration: none; }
    .lang-btn.active { color: #e53e3e; background: white; box-shadow: 0 2px 8px rgba(229,62,62,0.1); }
    .detail-page { padding: 60px 0; min-height: 60vh; }
    .detail-content { max-width: 800px; margin: 0 auto; background: #fef2f2; border-radius: 40px; padding: 3rem; text-align: center; }
    .big-icon { width: 150px; height: 150px; border-radius: 50%; overflow: hidden; margin: 0 auto 2rem; background: white; }
    .big-icon img { width: 100%; height: 100%; object-fit: cover; }
    .detail-content h2 { font-size: 2.5rem; margin-bottom: 0.5rem; color: #111827; }
    .detail-content h2 span { font-size: 1rem; color: #9ca3af; font-weight: 400; }
    .detail-desc { font-size: 1.2rem; color: #4b5563; margin: 1.5rem 0; }
    .detail-personality { color: #1f2937; margin-bottom: 2rem; }
    .detail-section { margin-top: 2rem; text-align: left; background: white; padding: 1.5rem; border-radius: 20px; }
    .detail-section h3 { color: #e53e3e; margin-bottom: 0.5rem; font-size: 1.3rem; }
    .back-link { text-align: center; margin-top: 2rem; }
    .btn { display: inline-block; padding: 12px 32px; border-radius: 40px; font-weight: 600; transition: all 0.3s; cursor: pointer; border: none; font-size: 1rem; }
    .btn-outline { background: transparent; color: #e53e3e; border: 2px solid #e53e3e; }
    .btn-outline:hover { background: #e53e3e; color: white; transform: translateY(-3px); }
    .footer { background: #111827; color: #d1d5db; padding: 40px 0; text-align: center; }
    .footer-credit { font-size: 0.9rem; color: #9ca3af; letter-spacing: 1px; }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="container">
      <a href="../index.html" class="logo">
        <img src="../images/logo.png" alt="LuckyXiao" class="logo-img" onerror="this.style.display='none'">
        <span class="logo-text">✦ LuckyXiao<span class="logo-highlight">肖确幸</span></span>
      </a>
      <div class="nav-right">
        <nav class="nav-links">
          <a href="../index.html">首页</a>
          <a href="../zodiacs.html">十二天团</a>
          <a href="merch.html">周边产品</a>
          <a href="about.html">理念</a>
          <a href="contact.html">联系</a>
        </nav>
        <div class="lang-switcher">
          <a href="zodiac-detail.html" class="lang-btn active">中</a>
          <span class="lang-divider">|</span>
          <a href="../zodiac-detail.html" class="lang-btn">EN</a>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="detail-page">
      <div class="container">
        <div class="detail-content" id="zodiac-detail">
          <p>正在加载...</p>
        </div>
        <div class="back-link">
          <a href="../zodiacs.html" class="btn btn-outline">← 返回十二天团</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2025 LuckyXiao肖确幸 · 原创IP。保留所有权利。</p>
      <p class="footer-credit">“BORN TO BE DIFFERENT 生而不同” — 重新发现世界与未来</p>
    </div>
  </footer>

  <script>

    const zodiacData = {
      // 鼠
      rat: {
        name: '鼠',
        en: 'RAT',
        desc: '机智灵敏 · 善于发现',
        personality: '机智灵敏，善于发现机会，社交达人。',
        character: '得瑟 · 毒舌 · 自以为是',
        skill: '痴迷美食，鼻子能像雷达一样搜寻食物；闻到美食鼻子会像气球一样变大。',
        img: '../images/zodiacs/zodiac-rat.png'
      },
      // 牛
      ox: {
        name: '牛',
        en: 'OX',
        desc: '勤勉坚韧 · 脚踏实地',
        personality: '勤勉坚韧，脚踏实地，可靠的伙伴。',
        character: '',
        skill: '',
        img: '../images/zodiacs/zodiac-ox.png'
      },
      // 虎
      tiger: {
        name: '虎',
        en: 'TIGER',
        desc: '勇敢无畏 · 王者风范',
        personality: '勇敢无畏，领导力强，喜欢挑战。',
        character: '',
        skill: '',
        img: '../images/zodiacs/zodiac-tiger.png'
      },
      // 兔
      rabbit: {
        name: '兔',
        en: 'RABBIT',
        desc: '温柔敏捷 · 善解人意',
        personality: '温柔敏捷，善解人意，爱好和平。',
        character: '',
        skill: '',
        img: '../images/zodiacs/zodiac-rabbit.png'
      },
      // 龙
      dragon: {
        name: '龙',
        en: 'DRAGON',
        desc: '气宇轩昂 · 开拓创新',
        personality: '气宇轩昂，富有创造力，充满活力。',
        character: '',
        skill: '',
        img: '../images/zodiacs/zodiac-dragon.png'
      },
      // 蛇
      snake: {
        name: '蛇',
        en: 'SNAKE',
        desc: '智慧神秘 · 深思熟虑',
        personality: '智慧神秘，深思熟虑，有远见。',
        character: '',
        skill: '',
        img: '../images/zodiacs/zodiac-snake.png'
      },
      // 马
      horse: {
        name: '马',
        en: 'HORSE',
        desc: '自由奔放 · 一往无前',
        personality: '自由奔放，热情开朗，追求自由。',
        character: '',
        skill: '',
        img: '../images/zodiacs/zodiac-horse.png'
      },
      // 羊
      goat: {
        name: '羊',
        en: 'GOAT',
        desc: '温和善良 · 热爱艺术',
        personality: '温和善良，有艺术气质，富有同情心。',
        character: '',
        skill: '',
        img: '../images/zodiacs/zodiac-goat.png'
      },
      // 猴
      monkey: {
        name: '猴',
        en: 'MONKEY',
        desc: '聪明活泼 · 创意无限',
        personality: '聪明活泼，创意无限，幽默机智。',
        character: '',
        skill: '',
        img: '../images/zodiacs/zodiac-monkey.png'
      },
      // 鸡 - 确保这里是 rooster
      rooster: {
        name: '鸡',
        en: 'ROOSTER',
        desc: '自信守时 · 追求完美',
        personality: '自信守时，追求完美，观察力强。',
        character: '敏感 · 神经质',
        skill: '喜爱唱歌，口若悬河；激动的时候鸡冠会一飞冲天。',
        img: '../images/zodiacs/zodiac-rooster.png'
      },
      // 狗
      dog: {
        name: '狗',
        en: 'DOG',
        desc: '忠诚正直 · 守护陪伴',
        personality: '忠诚正直，守护陪伴，正义感强。',
        character: '',
        skill: '',
        img: '../images/zodiacs/zodiac-dog.png'
      },
      // 猪
      pig: {
        name: '猪',
        en: 'PIG',
        desc: '豁达乐观 · 享受生活',
        personality: '豁达乐观，享受生活，真诚友善。',
        character: '',
        skill: '',
        img: '../images/zodiacs/zodiac-pig.png'
      }
    };

    // 获取URL参数
    function getParameterByName(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }

    // 渲染详情页
    function renderDetail() {
      const container = document.getElementById('zodiac-detail');
      if (!container) return;

      // 获取参数
      const zodiacName = getParameterByName('name');
      const fullUrl = window.location.href;
      
      // 调试信息
      console.log('完整URL:', fullUrl);
      console.log('参数name:', zodiacName);
      console.log('数据对象中的键:', Object.keys(zodiacData));

      // 检查参数是否存在
      if (!zodiacName) {
        container.innerHTML = `
          <p style="color:#e53e3e;">错误: URL中没有指定生肖参数</p>
          <p style="color:#666; font-size:0.9rem;">URL: ${fullUrl}</p>
        `;
        return;
      }

      // 检查数据中是否有这个键
      if (!zodiacData[zodiacName]) {
        container.innerHTML = `
          <p style="color:#e53e3e;">错误: 未找到生肖 "${zodiacName}" 的数据</p>
          <p style="color:#666; font-size:0.9rem;">可用的生肖: ${Object.keys(zodiacData).join(', ')}</p>
          <p style="color:#666; font-size:0.9rem;">URL: ${fullUrl}</p>
        `;
        return;
      }

      // 获取数据
      const zodiac = zodiacData[zodiacName];
      
      // 构建HTML
      let html = `
        <div class="big-icon">
          <img src="${zodiac.img}" alt="${zodiac.name}" onerror="this.src='https://via.placeholder.com/150/e53e3e/ffffff?text=${zodiac.name}'">
        </div>
        <h2>${zodiac.name} <span>${zodiac.en}</span></h2>
        <p class="detail-desc">${zodiac.desc}</p>
        <p class="detail-personality">${zodiac.personality}</p>
      `;

      // 如果有性格特征，显示
      if (zodiac.character && zodiac.character.trim() !== '') {
        html += `
          <div class="detail-section">
            <h3>性格特征</h3>
            <p>${zodiac.character}</p>
          </div>
        `;
      }

      // 如果有技能，显示
      if (zodiac.skill && zodiac.skill.trim() !== '') {
        html += `
          <div class="detail-section">
            <h3>技能</h3>
            <p>${zodiac.skill}</p>
          </div>
        `;
      }

      container.innerHTML = html;
    }

    // 页面加载完成后执行
    document.addEventListener('DOMContentLoaded', renderDetail);
  </script>
</body>
</html>
