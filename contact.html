<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuckyXiao · Contact</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* 完整样式 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #1f2937; background-color: #ffffff; }
    a { text-decoration: none; color: inherit; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    
    /* 导航栏 */
    .navbar { background: #ffffff; box-shadow: 0 2px 15px rgba(229, 62, 62, 0.1); padding: 16px 0; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(5px); background: rgba(255,255,255,0.95); }
    .navbar .container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .logo { display: flex; align-items: center; gap: 10px; font-size: 1.5rem; font-weight: 700; }
    .logo-img { height: 40px; width: auto; }
    .logo-highlight { color: #e53e3e; }
    .nav-right { display: flex; align-items: center; gap: 2rem; }
    .nav-links { display: flex; gap: 2.5rem; font-weight: 500; }
    .nav-links a { transition: color 0.2s; position: relative; }
    .nav-links a:hover { color: #e53e3e; }
    .lang-switcher { display: flex; align-items: center; gap: 6px; background: #fef2f2; padding: 5px 12px; border-radius: 30px; }
    .lang-btn { background: none; border: none; font-size: 1rem; font-weight: 600; color: #9ca3af; cursor: pointer; padding: 4px 8px; border-radius: 20px; text-decoration: none; }
    .lang-btn.active { color: #e53e3e; background: white; box-shadow: 0 2px 8px rgba(229,62,62,0.1); }
    .lang-divider { color: #d1d5db; }

    /* 页头 */
    .page-header { padding: 60px 0 30px; text-align: center; background: #f9fafb; }
    .page-header h1 { font-size: 3rem; margin-bottom: 1rem; }
    .title-highlight { color: #e53e3e; position: relative; display: inline-block; }

    /* 联系信息 */
    .contact-info { padding: 60px 0; }
    .contact-detail { max-width: 600px; margin: 0 auto; background: #fef2f2; border-radius: 40px; padding: 3rem; }
    .contact-item { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.8rem; }
    .contact-item i { font-size: 1.5rem; color: #e53e3e; width: 2rem; text-align: center; }
    .contact-item span { font-size: 1.1rem; color: #374151; }
    .social-links { display: flex; gap: 1.5rem; margin-top: 2rem; justify-content: center; flex-wrap: wrap; }
    .social-links a { background: white; padding: 12px 25px; border-radius: 40px; display: inline-flex; align-items: center; gap: 8px; color: #e53e3e; transition: all 0.3s; }
    .social-links a:hover { background: #e53e3e; color: white; transform: translateY(-3px); }

    /* 页脚 */
    .footer { background: #111827; color: #d1d5db; padding: 40px 0; text-align: center; }
    .footer-credit { font-size: 0.9rem; color: #9ca3af; letter-spacing: 1px; }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="container">
      <a href="index.html" class="logo">
        <img src="images/logo.png" alt="LuckyXiao" class="logo-img" onerror="this.style.display='none'">
        <span class="logo-text">✦ LuckyXiao</span>
      </a>
      <div class="nav-right">
        <nav class="nav-links">
          <a href="index.html">Home</a>
          <a href="zodiacs.html">Zodiacs</a>
          <a href="merch.html">Merch</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </nav>
        <div class="lang-switcher">
          <a href="zh/contact.html" class="lang-btn">中</a>
          <span class="lang-divider">|</span>
          <a href="contact.html" class="lang-btn active">EN</a>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="page-header">
      <div class="container">
        <h1>Contact<span class="title-highlight">Us</span></h1>
      </div>
    </section>

    <section class="contact-info">
      <div class="container">
        <div class="contact-detail">
          <div class="contact-item">
            <i class="fas fa-envelope"></i>
            <span>hello@luckyxiao.com</span>
          </div>
          <div class="contact-item">
            <i class="fas fa-phone-alt"></i>
            <span>+86 (010) 1234-5678</span>
          </div>
          <div class="contact-item">
            <i class="fas fa-map-marker-alt"></i>
            <span>Beijing · Chaoyang · Digital Park</span>
          </div>
          <div class="social-links">
            <a href="#"><i class="fas fa-music"></i><span>Douyin</span></a>
            <a href="#"><i class="fas fa-book-open"></i><span>Xiaohongshu</span></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
            <a href="#"><i class="fab fa-tiktok"></i></a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2025 LuckyXiao · Original IP. All rights reserved.</p>
      <p class="footer-credit">"BORN TO BE DIFFERENT" — Rediscover the world and future</p>
    </div>
  </footer>
</body>
</html>
